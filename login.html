<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAFLIMITED — Авторизация</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <header class="header">
    <div class="container header__container">
      <a href="index.html" class="logo">RAFLIMITED</a>

      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="index.html#about">О нас</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>

      <div class="header__icons">
        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="login.html" id="user-link"><i class="fa-regular fa-user"></i></a>
        <a href="cart.html" class="cart-link">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container auth-page">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" id="login-tab-btn" type="button">Вход</button>
          <button class="auth-tab" id="register-tab-btn" type="button">Регистрация</button>
        </div>

        <div id="login-form-block">
          <h1 class="auth-title">Вход в аккаунт</h1>
          <p class="auth-subtitle">Введите данные, чтобы войти в личный кабинет</p>

          <form class="auth-form" id="login-form">
            <label>
              <span>E-mail</span>
              <input type="email" id="login-email" placeholder="Введите e-mail" required />
            </label>

            <label>
              <span>Пароль</span>
              <input type="password" id="login-password" placeholder="Введите пароль" required />
            </label>

            <button type="submit" class="btn btn-dark auth-submit-btn">Войти</button>
          </form>
        </div>

        <div id="register-form-block" class="hidden">
          <h1 class="auth-title">Регистрация</h1>
          <p class="auth-subtitle">Создайте аккаунт, чтобы сохранять заказы и избранное</p>

          <form class="auth-form" id="register-form">
            <label>
              <span>Имя</span>
              <input type="text" id="register-name" placeholder="Введите имя" required />
            </label>

            <label>
              <span>E-mail</span>
              <input type="email" id="register-email" placeholder="Введите e-mail" required />
            </label>

            <label>
              <span>Пароль</span>
              <input type="password" id="register-password" placeholder="Придумайте пароль" required />
            </label>

            <button type="submit" class="btn btn-dark auth-submit-btn">Зарегистрироваться</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom">
      <p>© 2026 Raflimited. Все права защищены</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
